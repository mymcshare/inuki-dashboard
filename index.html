<title>居抜き物件ダッシュボード｜ラーメン出店候補（1都3県）</title>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#1d212b; --line:#2a2f3a;
    --txt:#e7e9ee; --muted:#9aa3b2; --accent:#ff7a18; --accent2:#ffb347;
    --good:#2ecc71; --mid:#f1c40f; --low:#7f8c9b; --chip:#262b36;
    --blue:#4aa3ff;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,system-ui,sans-serif;font-size:14px;line-height:1.5}
  header{padding:20px 24px;background:linear-gradient(180deg,#1b1f29,#13161d);border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:16px}
  .header-left{flex:1}
  #refreshBtn{flex-shrink:0;background:var(--accent);color:#1a1206;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background .15s}
  #refreshBtn:hover:not(:disabled){background:var(--accent2)}
  #refreshBtn:disabled{background:#555;color:#999;cursor:not-allowed}
  h1{margin:0 0 4px;font-size:20px;letter-spacing:.02em}
  h1 .ramen{color:var(--accent)}
  .sub{color:var(--muted);font-size:12.5px}
  .wrap{padding:18px 24px 60px;max-width:1320px;margin:0 auto}
  .stats{display:flex;flex-wrap:wrap;gap:10px;margin:16px 0}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 14px;min-width:120px}
  .stat .n{font-size:22px;font-weight:700}
  .stat .l{font-size:11.5px;color:var(--muted)}
  .stat.accent .n{color:var(--accent)}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:16px}
  .filters{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px 18px;align-items:end}
  .f label{display:block;font-size:11.5px;color:var(--muted);margin-bottom:5px}
  select,input[type=text]{width:100%;background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13px}
  .prefs{display:flex;flex-wrap:wrap;gap:6px}
  .pchip{cursor:pointer;user-select:none;background:var(--chip);border:1px solid var(--line);border-radius:999px;padding:5px 12px;font-size:12.5px}
  .pchip.on{background:var(--accent);color:#1a1206;border-color:var(--accent);font-weight:700}
  .toggles{display:flex;flex-wrap:wrap;gap:14px;margin-top:4px}
  .toggles label{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--txt);cursor:pointer}
  .count{margin:6px 2px 10px;color:var(--muted);font-size:12.5px}
  table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--line);vertical-align:top}
  th{position:sticky;top:0;background:var(--panel2);font-size:11.5px;color:var(--muted);font-weight:600;white-space:nowrap;z-index:1}
  tbody tr{transition:background .12s}
  tbody tr:hover{background:#20242f}
  td .place{font-weight:700;font-size:14px}
  td .stn{color:var(--txt);font-size:12.5px}
  td .stn .walk{color:var(--accent2);font-weight:700;margin-left:4px}
  td .cmt{color:#c4ccd8;font-size:11.5px;margin-top:4px}
  .badge{display:inline-block;border-radius:6px;padding:2px 8px;font-size:11.5px;font-weight:700;white-space:nowrap}
  .b-good{background:rgba(46,204,113,.16);color:var(--good);border:1px solid rgba(46,204,113,.4)}
  .b-mid{background:rgba(241,196,15,.14);color:var(--mid);border:1px solid rgba(241,196,15,.38)}
  .b-low{background:rgba(127,140,155,.14);color:var(--low);border:1px solid rgba(127,140,155,.38)}
  .new{background:var(--accent);color:#1a1206;border-radius:5px;padding:1px 6px;font-size:10.5px;font-weight:800;margin-left:6px;vertical-align:middle}
  .pref-t{font-size:11px;color:var(--blue);border:1px solid rgba(74,163,255,.35);border-radius:5px;padding:1px 6px;background:rgba(74,163,255,.1)}
  .rent{font-weight:700}
  .tag{display:inline-block;background:var(--chip);border:1px solid var(--line);border-radius:5px;padding:1px 6px;font-size:11px;color:#cfd6e2;margin-top:3px}
  a.btn{display:inline-block;text-decoration:none;background:var(--accent);color:#1a1206;font-weight:700;border-radius:7px;padding:6px 12px;font-size:12px;white-space:nowrap}
  a.btn:hover{background:var(--accent2)}
  .legend{display:flex;flex-wrap:wrap;gap:14px;color:var(--muted);font-size:12px;margin-top:10px}
  .note{background:#15191f;border:1px dashed var(--line);border-radius:10px;padding:12px 14px;color:var(--muted);font-size:12px;margin-top:18px;line-height:1.7}
  .note b{color:var(--txt)}
  th.sortable{cursor:pointer;user-select:none}
  th.sortable:hover{color:var(--txt)}
  th.sortable .arw{color:var(--accent);font-weight:800;margin-left:3px}
  th.sortable.active{color:var(--txt)}
  .empty{padding:30px;text-align:center;color:var(--muted)}
  @media(max-width:820px){
    td .cmt{display:none}
    .hide-sp{display:none}
  }
</style>
</head>

<header>
  <div class="header-left">
    <h1>居抜き物件ダッシュボード <span class="ramen">🍜 ラーメン出店候補</span></h1>
    <div class="sub">対象エリア：1都3県（東京・神奈川・千葉・埼玉）</div>
  </div>
  <button id="refreshBtn" onclick="triggerUpdate()">↻ データ更新</button>
</header>

<div class="wrap">

  <div class="stats" id="stats"></div>

  <div class="panel">
    <div class="f" style="margin-bottom:12px">
      <label>都県でしぼる</label>
      <div class="prefs" id="prefs"></div>
    </div>
    <div class="filters">
      <div class="f">
        <label>賃料の上限</label>
        <select id="rentMax">
          <option value="">指定なし</option>
          <option value="15">15万円以下</option>
          <option value="20">20万円以下</option>
          <option value="30">30万円以下</option>
          <option value="40">40万円以下</option>
          <option value="50">50万円以下</option>
          <option value="80">80万円以下</option>
        </select>
      </div>
      <div class="f">
        <label>面積（坪）の下限</label>
        <select id="tsuboMin">
          <option value="">指定なし</option>
          <option value="8">8坪以上</option>
          <option value="10">10坪以上</option>
          <option value="15">15坪以上</option>
          <option value="20">20坪以上</option>
        </select>
      </div>
      <div class="f">
        <label>面積（坪）の上限</label>
        <select id="tsuboMax">
          <option value="">指定なし</option>
          <option value="20">20坪以下</option>
          <option value="30">30坪以下</option>
          <option value="50">50坪以下</option>
          <option value="100">100坪以下</option>
        </select>
      </div>
      <div class="f">
        <label>駅から徒歩</label>
        <select id="walkMax">
          <option value="">指定なし</option>
          <option value="3">3分以内</option>
          <option value="5">5分以内</option>
          <option value="10">10分以内</option>
        </select>
      </div>
      <div class="f">
        <label>キーワード（地名・駅・前業態）</label>
        <input type="text" id="kw" placeholder="例：行徳、居酒屋、横浜">
      </div>
      <div class="f">
        <label>並び替え</label>
        <select id="sort">
          <option value="regDate|desc">登録日が新しい順</option>
          <option value="regDate|asc">登録日が古い順</option>
          <option value="score|desc">ラーメン適性スコア順</option>
          <option value="rentMan|asc">賃料が安い順</option>
          <option value="rentMan|desc">賃料が高い順</option>
          <option value="tsubo|desc">面積が広い順</option>
          <option value="tsubo|asc">面積が狭い順</option>
          <option value="walk|asc">駅から近い順</option>
          <option value="walk|desc">駅から遠い順</option>
        </select>
      </div>
    </div>
    <div class="toggles">
      <label><input type="checkbox" id="juuOnly" checked> 重飲食可（ラーメン出店可）のみ</label>
      <label><input type="checkbox" id="kitchenOnly"> 厨房を流用しやすい前業態のみ</label>
      <label><input type="checkbox" id="oneFloor"> 1階・路面のみ</label>
    </div>
    <div class="legend">
      <span><span class="badge b-good">◎ 有力</span> 重飲食可＋立地/厨房/規模が好条件</span>
      <span><span class="badge b-mid">○ 候補</span> 重飲食可で標準的</span>
      <span><span class="badge b-low">△ 要検討</span> 軽飲食のみ等、改装前提</span>
      <span style="color:var(--accent2)">※「最寄り駅」「賃料」「面積」「登録日」の見出しクリックでも並べ替え（再クリックで昇順⇄降順）</span>
    </div>
  </div>

  <div class="count" id="count"></div>

  <table id="tbl">
    <thead>
      <tr>
        <th class="sortable" data-field="score" data-default="desc">ラーメン適性</th>
        <th>所在地</th>
        <th class="sortable" data-field="walk" data-default="asc">最寄り駅（徒歩）</th>
        <th class="hide-sp">前業態</th>
        <th class="sortable" data-field="rentMan" data-default="asc">賃料</th>
        <th class="sortable" data-field="tsubo" data-default="desc">面積</th>
        <th class="hide-sp">階数</th>
        <th class="sortable" data-field="regDate" data-default="desc">登録日</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
  <div class="empty" id="empty" style="display:none">条件に合う物件がありません。フィルターを緩めてください。</div>

</div>

    "url": "https://www.inshokuten.com/bukken/bukkens/380080"
  }
];

const PREFS = ["東京","神奈川","千葉","埼玉"];
const KITCHEN_GOOD = ["ラーメン","中華","中国料理","そば","うどん","居酒屋","焼肉","定食","和食","鉄板","焼鳥","割烹","ダイニング"];
const state = {prefs:new Set(PREFS), rentMax:"", tsuboMin:"", tsuboMax:"", walkMax:"", kw:"", sortField:"regDate", sortDir:"desc", juuOnly:true, kitchenOnly:false, oneFloor:false};

// 最寄り駅の表示：路線+駅名 と 徒歩N分 を分ける
function stationLine(d){ return (d.station||"").replace(/\s*徒歩.*$/,"").trim(); }
function walkText(d){ return (d.walk!=null && !isNaN(d.walk)) ? ("徒歩"+d.walk+"分") : ""; }

// 新着（データ内の最新登録日から3日以内）
const maxDate = DATA.reduce((m,d)=>d.regDate>m?d.regDate:m, "0");
function daysBetween(a,b){return Math.round((new Date(a)-new Date(b))/86400000);}
function isNew(d){return Math.abs(daysBetween(maxDate,d.regDate))<=3;}
function goodKitchen(d){return KITCHEN_GOOD.some(k=>(d.prevTenant||"").includes(k));}
function isGround(d){return (d.floor||"").includes("地上1");}

function score(d){
  let s=0;
  if(d.juu) s+=3; else s-=2;
  if(goodKitchen(d)) s+=2;
  if(isGround(d)) s+=2;
  if(d.walk<=5) s+=2; else if(d.walk<=10) s+=1;
  if(d.tsubo>=10 && d.tsubo<=25) s+=2; else if(d.tsubo>=8 && d.tsubo<=30) s+=1;
  if(d.rentMan!=null && d.rentMan<=40) s+=1;
  return s;
}
function badge(d){
  const s=score(d);
  if(!d.juu) return {cls:"b-low",txt:"△ 要検討"};
  if(s>=10) return {cls:"b-good",txt:"◎ 有力"};
  if(s>=7) return {cls:"b-mid",txt:"○ 候補"};
  return {cls:"b-low",txt:"△ 要検討"};
}

function renderPrefs(){
  const el=document.getElementById("prefs");
  el.innerHTML="";
  PREFS.forEach(p=>{
    const span=document.createElement("span");
    span.className="pchip"+(state.prefs.has(p)?" on":"");
    span.textContent=p;
    span.onclick=()=>{ if(state.prefs.has(p))state.prefs.delete(p); else state.prefs.add(p); renderPrefs(); render(); };
    el.appendChild(span);
  });
}

function compare(a,b){
  const f=state.sortField, dir=state.sortDir==="asc"?1:-1;
  let av,bv;
  if(f==="score"){ av=score(a); bv=score(b); }
  else if(f==="regDate"){ av=a.regDate; bv=b.regDate; if(av<bv)return -1*dir; if(av>bv)return 1*dir; return score(b)-score(a); }
  else {
    av=a[f]; bv=b[f];
    if(av==null) av = dir>0 ? Infinity : -Infinity;   // 「相談」等は常に末尾
    if(bv==null) bv = dir>0 ? Infinity : -Infinity;
  }
  if(av<bv) return -1*dir;
  if(av>bv) return 1*dir;
  return score(b)-score(a);
}

function applyFilters(){
  let rows=DATA.filter(d=>state.prefs.has(d.pref));
  if(state.juuOnly) rows=rows.filter(d=>d.juu);
  if(state.kitchenOnly) rows=rows.filter(goodKitchen);
  if(state.oneFloor) rows=rows.filter(isGround);
  if(state.rentMax) rows=rows.filter(d=>d.rentMan!=null && d.rentMan<=+state.rentMax);
  if(state.tsuboMin) rows=rows.filter(d=>d.tsubo>=+state.tsuboMin);
  if(state.tsuboMax) rows=rows.filter(d=>d.tsubo<=+state.tsuboMax);
  if(state.walkMax) rows=rows.filter(d=>d.walk<=+state.walkMax);
  if(state.kw.trim()){
    const k=state.kw.trim();
    rows=rows.filter(d=>(d.city+d.station+d.prevTenant+d.comment).includes(k));
  }
  rows.sort(compare);
  return rows;
}

function renderStats(){
  const el=document.getElementById("stats");
  const all=DATA.length;
  const ramen=DATA.filter(d=>d.juu).length;
  const yuryoku=DATA.filter(d=>d.juu && badge(d).txt.startsWith("◎")).length;
  const byPref=PREFS.map(p=>p+":"+DATA.filter(d=>d.pref===p && d.juu).length).join("　");
  el.innerHTML=`
    <div class="stat"><div class="n">${all}</div><div class="l">取得件数（居抜き）</div></div>
    <div class="stat accent"><div class="n">${ramen}</div><div class="l">ラーメン出店可（重飲食可）</div></div>
    <div class="stat"><div class="n">${yuryoku}</div><div class="l">◎ 有力候補</div></div>
    <div class="stat" style="min-width:auto"><div class="n" style="font-size:13px;line-height:2.4">${byPref}</div><div class="l">都県別 重飲食可</div></div>
    <div class="stat" style="min-width:150px">
      <div class="n" style="font-size:13px;line-height:1.9">${CRAWL_DATE.replace(" ","<br>")}</div>
      <div class="l">データ更新日時</div>
      <div id="updateResult" style="font-size:11px;margin-top:4px;font-weight:700"></div>
    </div>
  `;
}

function updateSortUI(){
  document.getElementById("sort").value = state.sortField+"|"+state.sortDir;
  document.querySelectorAll("th.sortable").forEach(th=>{
    const f=th.dataset.field;
    const base=th.textContent.replace(/[ ▲▼]+$/,"");
    if(f===state.sortField){
      th.classList.add("active");
      th.innerHTML = base + ` <span class="arw">${state.sortDir==="asc"?"▲":"▼"}</span>`;
    } else {
      th.classList.remove("active");
      th.textContent = base;
    }
  });
}

function render(){
  const rows=applyFilters();
  const tb=document.getElementById("rows");
  tb.innerHTML="";
  document.getElementById("count").textContent=`表示中 ${rows.length} 件`;
  document.getElementById("empty").style.display=rows.length?"none":"block";
  rows.forEach(d=>{
    const b=badge(d);
    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td><span class="badge ${b.cls}">${b.txt}</span></td>
      <td>
        <div class="place"><span class="pref-t">${d.pref}</span> ${d.city}${isNew(d)?'<span class="new">新着</span>':''}</div>
        <div class="cmt">${d.comment||""}</div>
      </td>
      <td><div class="stn">${stationLine(d)}<span class="walk">${walkText(d)}</span></div></td>
      <td class="hide-sp">${d.prevTenant?`<span class="tag">${d.prevTenant}</span>`:'<span class="cmt">—</span>'}</td>
      <td><span class="rent">${d.rentRaw}</span></td>
      <td>${d.tsubo}坪</td>
      <td class="hide-sp">${d.floor}</td>
      <td>${d.regDate.slice(5)}</td>
      <td><a class="btn" href="${d.url}" target="_blank" rel="noopener">詳細 ↗</a></td>
    `;
    tb.appendChild(tr);
  });
  updateSortUI();
}

// events
document.getElementById("gen").textContent=CRAWL_DATE;
document.getElementById("rentMax").onchange=e=>{state.rentMax=e.target.value;render();};
document.getElementById("tsuboMin").onchange=e=>{state.tsuboMin=e.target.value;render();};
document.getElementById("tsuboMax").onchange=e=>{state.tsuboMax=e.target.value;render();};
document.getElementById("walkMax").onchange=e=>{state.walkMax=e.target.value;render();};
document.getElementById("kw").oninput=e=>{state.kw=e.target.value;render();};
document.getElementById("sort").onchange=e=>{const [f,dir]=e.target.value.split("|");state.sortField=f;state.sortDir=dir;render();};
document.getElementById("juuOnly").onchange=e=>{state.juuOnly=e.target.checked;render();};
document.getElementById("kitchenOnly").onchange=e=>{state.kitchenOnly=e.target.checked;render();};
document.getElementById("oneFloor").onchange=e=>{state.oneFloor=e.target.checked;render();};
document.querySelectorAll("th.sortable").forEach(th=>{
  th.onclick=()=>{
    const f=th.dataset.field;
    const def=th.dataset.default||"desc";
    if(state.sortField===f){ state.sortDir = state.sortDir==="asc"?"desc":"asc"; }
    else { state.sortField=f; state.sortDir=def; }
    render();
  };
});

renderPrefs();
renderStats();
checkUpdateResult();
render();

function checkUpdateResult(){
  const prev=localStorage.getItem("inuki_prev_date");
  const at=localStorage.getItem("inuki_trigger_at");
  if(!prev||!at) return;
  localStorage.removeItem("inuki_prev_date");
  localStorage.removeItem("inuki_trigger_at");
  if(Date.now()-parseInt(at)>5*60*1000) return;
  const el=document.getElementById("updateResult");
  if(!el) return;
  const t=new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});
  if(CRAWL_DATE!==prev){
    el.textContent=`✓ 成功  ${t}`;
    el.style.color="var(--good)";
  } else {
    el.textContent=`✗ 失敗  ${t}`;
    el.style.color="#e74c3c";
  }
}

async function triggerUpdate(){
  const btn=document.getElementById("refreshBtn");
  btn.disabled=true;
  btn.textContent="送信中...";
  try{
    const res=await fetch("https://snowy-field-a3c9.ict-share.workers.dev",{method:"POST"});
    if(res.ok){
      localStorage.setItem("inuki_prev_date",CRAWL_DATE);
      localStorage.setItem("inuki_trigger_at",Date.now());
      let n=90;
      btn.textContent=`更新中... ${n}秒後にリロード`;
      const t=setInterval(()=>{
        n--;
        btn.textContent=`更新中... ${n}秒後にリロード`;
        if(n<=0){clearInterval(t);location.reload();}
      },1000);
    } else {
      btn.textContent="エラー（再試行）";
      btn.disabled=false;
    }
  } catch(e){
    btn.textContent="エラー（再試行）";
    btn.disabled=false;
  }
}
</script>
</body>
</html>
