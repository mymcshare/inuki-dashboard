<style>
:root{
  --bg:#0e1116; --panel:#171c24; --panel2:#1e252f; --line:#2a323d;

  --good:#3ddc84; --ok:#ffd34d; --warn:#8a97a5; --chip:#243040;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--txt);font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",system-ui,sans-serif;font-size:14px;line-height:1.5}
a{color:var(--accent2);text-decoration:none}
a:hover{text-decoration:underline}
header{padding:18px 20px;background:linear-gradient(180deg,#1a2230,#10141b);border-bottom:1px solid var(--line)}
header h1{margin:0 0 6px;font-size:20px}
header .sub{color:var(--muted);font-size:12.5px}
.wrap{padding:16px 20px 60px;max-width:1400px;margin:0 auto}
.summary{display:flex;flex-wrap:wrap;gap:10px;margin:14px 0}
.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 14px;min-width:120px}
.card .n{font-size:22px;font-weight:700}
.card .l{font-size:11.5px;color:var(--muted)}
.prefchips{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}
.prefchip{background:var(--chip);border:1px solid var(--line);border-radius:20px;padding:5px 12px;cursor:pointer;font-size:12.5px;user-select:none}
.prefchip.active{background:var(--accent);color:#10141b;border-color:var(--accent);font-weight:700}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px;margin:12px 0}
.filters{display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:11.5px;color:var(--muted)}
.fg input,.fg select{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:7px;padding:7px 9px;font-size:13px}
.fg input[type=number]{width:90px}
.fg input[type=text]{width:180px}
.toggles{display:flex;flex-wrap:wrap;gap:16px;margin-top:12px}
.toggles label{display:flex;align-items:center;gap:6px;font-size:12.5px;cursor:pointer;color:var(--txt)}
.count-line{margin:8px 2px;color:var(--muted);font-size:12.5px}
.tablewrap{overflow-x:auto;border:1px solid var(--line);border-radius:10px}
table{border-collapse:collapse;width:100%;min-width:1050px;background:var(--panel)}
th,td{padding:9px 10px;text-align:left;border-bottom:1px solid var(--line);vertical-align:top;font-size:12.8px}
th{background:var(--panel2);position:sticky;top:0;cursor:pointer;white-space:nowrap;color:var(--muted);font-weight:600;z-index:1}
th:hover{color:var(--txt)}
tr:hover td{background:#1b222c}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-weight:700;font-size:12px;white-space:nowrap}
.b-good{background:rgba(61,220,132,.16);color:var(--good);border:1px solid rgba(61,220,132,.4)}
.b-ok{background:rgba(255,211,77,.14);color:var(--ok);border:1px solid rgba(255,211,77,.4)}
.b-warn{background:rgba(138,151,165,.12);color:var(--warn);border:1px solid rgba(138,151,165,.35)}
.pref{display:inline-block;padding:1px 7px;border-radius:5px;font-size:11px;margin-right:6px;background:var(--chip);border:1px solid var(--line)}
.pref-東京{color:#ff8a3d}.pref-神奈川{color:#3da9fc}.pref-千葉{color:#3ddc84}.pref-埼玉{color:#c792ea}
.newtag{display:inline-block;background:var(--accent);color:#10141b;font-weight:700;font-size:10px;padding:1px 6px;border-radius:5px;margin-left:6px}
.src{display:block;color:var(--muted);font-size:10.5px;margin-top:3px}
.score{color:var(--muted);font-size:11px;margin-left:6px}
.rent{font-weight:700}
.muted{color:var(--muted)}
.foot{color:var(--muted);font-size:11.5px;margin-top:22px;line-height:1.7}
.arrow{font-size:10px;color:var(--accent)}
.scoremini{font-size:10.5px;color:var(--muted)}
</style>
</head>
<body>
<header>
  <h1>🍜 ラーメン店 居抜き物件ダッシュボード <span style="font-size:13px;color:var(--muted)">1都3県（東京・神奈川・千葉・埼玉）</span></h1>
  <div class="sub" id="headsub"></div>
</header>
<div class="wrap">
  <div class="summary" id="summary"></div>
  <div class="prefchips" id="prefchips"></div>

  <div class="panel">
    <div class="filters">
      <div class="fg"><label>賃料上限（万円）</label><input type="number" id="rentMax" placeholder="例: 40"></div>
      <div class="fg"><label>坪 下限</label><input type="number" id="tsuboMin" placeholder="例: 8"></div>
      <div class="fg"><label>坪 上限</label><input type="number" id="tsuboMax" placeholder="例: 30"></div>
      <div class="fg"><label>駅徒歩以内（分）</label>
        <select id="walkMax">
          <option value="">指定なし</option><option value="1">1分</option><option value="3">3分</option>
          <option value="5">5分</option><option value="10">10分</option><option value="15">15分</option>
        </select></div>
      <div class="fg"><label>キーワード（駅・地名・前業態）</label><input type="text" id="kw" placeholder="例: 大山 / ラーメン"></div>
      <div class="fg"><label>並び替え</label>
        <select id="sortKey">
          <option value="regDate">登録日</option><option value="score">スコア</option>
          <option value="rentMan">賃料</option><option value="tsubo">面積</option><option value="walk">駅徒歩</option>
        </select></div>
      <div class="fg"><label>順序</label>
        <select id="sortDir"><option value="desc">降順</option><option value="asc">昇順</option></select></div>
    </div>
    <div class="toggles">
      <label><input type="checkbox" id="tJuu" checked> 重飲食可のみ</label>
      <label><input type="checkbox" id="tReuse"> 厨房を流用しやすい前業態のみ</label>
      <label><input type="checkbox" id="t1f"> 1階のみ</label>
    </div>
  </div>

  <div class="count-line" id="countline"></div>
  <div class="tablewrap">
    <table id="tbl">
      <thead><tr>
        <th data-k="score">適性 <span class="arrow"></span></th>
        <th data-k="city">所在地 <span class="arrow"></span></th>
        <th data-k="station">最寄り駅 <span class="arrow"></span></th>
        <th data-k="prevTenant">前業態 <span class="arrow"></span></th>
        <th data-k="rentMan">賃料 <span class="arrow"></span></th>
        <th data-k="tsubo">面積(坪) <span class="arrow"></span></th>
        <th data-k="floor">階数 <span class="arrow"></span></th>
        <th data-k="regDate">登録日 <span class="arrow"></span></th>
        <th>詳細</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="foot" id="foot"></div>
</div>

let state = {pref:null, sortKey:"regDate", sortDir:"desc"};

function badgeClass(b){ if(b.indexOf("◎")>=0)return "b-good"; if(b.indexOf("○")>=0)return "b-ok"; return "b-warn"; }
function rentText(r){ return (r==null)?'<span class="muted">要相談</span>':('<span class="rent">'+r+'</span><span class="muted">万円</span>'); }
function num(v){ return (v==null)?null:v; }

function renderSummary(list){
  const total=ALL.length;
  const newToday=ALL.filter(r=>r.isNew).length;
  const juu=ALL.filter(r=>r.juu).length;
  const strong=ALL.filter(r=>r.badge.indexOf("◎")>=0).length;
  const byp={};
  ALL.forEach(r=>{byp[r.pref]=(byp[r.pref]||0)+1});
  const newHtml='<div class="card" style="border-color:var(--accent);background:rgba(255,138,61,.08)"><div class="n" style="color:var(--accent)">+'+(newToday||0)+'</div><div class="l">前回比 新着件数</div></div>';
  const cards=[
    ["累計取得件数",total],
    ["重飲食可",juu],
    ["◎有力",strong],
    ["東京",byp["東京"]||0],["神奈川",byp["神奈川"]||0],["千葉",byp["千葉"]||0],["埼玉",byp["埼玉"]||0],
  ];
  document.getElementById("summary").innerHTML=newHtml+cards.map(c=>'<div class="card"><div class="n">'+c[1]+'</div><div class="l">'+c[0]+'</div></div>').join("");
}

function renderPrefChips(){
  const prefs=["東京","神奈川","千葉","埼玉"];
  const el=document.getElementById("prefchips");
  let h='<span class="prefchip'+(state.pref===null?' active':'')+'" data-p="">すべて</span>';
  h+=prefs.map(p=>'<span class="prefchip'+(state.pref===p?' active':'')+'" data-p="'+p+'">'+p+'</span>').join("");
  el.innerHTML=h;
  el.querySelectorAll(".prefchip").forEach(c=>c.onclick=()=>{state.pref=c.dataset.p||null;renderPrefChips();render();});
}

function applyFilters(){
  let list=ALL.slice();
  if(state.pref) list=list.filter(r=>r.pref===state.pref);
  const rentMax=parseFloat(document.getElementById("rentMax").value);
  const tMin=parseFloat(document.getElementById("tsuboMin").value);
  const tMax=parseFloat(document.getElementById("tsuboMax").value);
  const walkMax=document.getElementById("walkMax").value;
  const kw=document.getElementById("kw").value.trim();
  const tJuu=document.getElementById("tJuu").checked;
  const tReuse=document.getElementById("tReuse").checked;
  const t1f=document.getElementById("t1f").checked;

  if(!isNaN(rentMax)) list=list.filter(r=> r.rentMan!=null && r.rentMan<=rentMax);
  if(!isNaN(tMin)) list=list.filter(r=> r.tsubo!=null && r.tsubo>=tMin);
  if(!isNaN(tMax)) list=list.filter(r=> r.tsubo!=null && r.tsubo<=tMax);
  if(walkMax){ const wm=parseFloat(walkMax); list=list.filter(r=> r.walk==null || r.walk<=wm); } // バス便(walk=null)は対象外
  if(kw){ list=list.filter(r=> ((r.city||"")+(r.station||"")+(r.line||"")+(r.prevTenant||"")).indexOf(kw)>=0 ); }
  if(tJuu) list=list.filter(r=>r.juu);
  if(tReuse) list=list.filter(r=>r.prevReuse);
  if(t1f) list=list.filter(r=> (r.floor||"").indexOf("地上1")>=0);
  return list;
}

function sortList(list){
  const k=state.sortKey, dir=state.sortDir==="asc"?1:-1;
  list.sort((a,b)=>{
    let va=a[k], vb=b[k];
    if(k==="rentMan"||k==="tsubo"||k==="walk"||k==="score"){
      // nullは常に末尾
      const na=(va==null), nb=(vb==null);
      if(na&&nb)return 0; if(na)return 1; if(nb)return -1;
      return (va-vb)*dir;
    }else{
      va=va||""; vb=vb||"";
      if(va<vb)return -1*dir; if(va>vb)return 1*dir; return 0;
    }
  });
  return list;
}

function render(){
  let list=applyFilters();
  list=sortList(list);
  const tb=document.getElementById("tbody");
  tb.innerHTML=list.map(r=>{
    const walkTxt = (r.walk==null)?'<span class="muted">バス/要確認</span>':('徒歩'+r.walk+'分');
    const station = '<div>'+(r.line?('<span class="muted">'+r.line+'</span> '):'')+(r.station||'')+'</div><div>'+walkTxt+'</div>';
    const loc='<span class="pref pref-'+r.pref+'">'+r.pref+'</span>'+(r.city||'')+(r.isNew?'<span class="newtag">NEW</span>':'')+'<span class="src">'+r.source+(r.dateConfirmed?'':' ※登録日未確認')+'</span>';
    const badge='<span class="badge '+badgeClass(r.badge)+'">'+r.badge+'</span><span class="scoremini"> '+r.score+'</span>';
    return '<tr>'+
      '<td>'+badge+'</td>'+
      '<td>'+loc+'</td>'+
      '<td>'+station+'</td>'+
      '<td>'+(r.prevTenant||'<span class="muted">—</span>')+'</td>'+
      '<td>'+rentText(r.rentMan)+'</td>'+
      '<td>'+(r.tsubo!=null?r.tsubo:'<span class="muted">—</span>')+'</td>'+
      '<td>'+(r.floor||'<span class="muted">—</span>')+'</td>'+
      '<td>'+(r.regDate||'')+'</td>'+
      '<td><a href="'+r.url+'" target="_blank" rel="noopener">物件を見る ↗</a></td>'+
    '</tr>';
  }).join("");
  document.getElementById("countline").textContent="表示 "+list.length+" 件 / 全 "+ALL.length+" 件（当日新着）";
  updateArrows();
}

function updateArrows(){
  document.querySelectorAll("#tbl th").forEach(th=>{
    const sp=th.querySelector(".arrow"); if(!sp)return;
    const k=th.dataset.k;
    let mk=k; if(k==="city")mk="city"; if(k==="station")mk="station"; if(k==="prevTenant")mk="prevTenant"; if(k==="floor")mk="floor";
    sp.textContent=(mk===state.sortKey)?(state.sortDir==="asc"?"▲":"▼"):"";
  });
  document.getElementById("sortKey").value=["regDate","score","rentMan","tsubo","walk"].includes(state.sortKey)?state.sortKey:"regDate";
  document.getElementById("sortDir").value=state.sortDir;
}

function init(){
  document.getElementById("headsub").innerHTML=
    '<span style="color:var(--txt);font-weight:700">最終更新: '+META.generatedAt+' JST</span>'+
    ' ｜ 毎日 23:50 自動更新'+
    '<br>対象エリア: '+META.areas.join("・")+
    ' ｜ 出典: '+META.sources.join(" / ");
  renderSummary();
  renderPrefChips();
  ["rentMax","tsuboMin","tsuboMax","kw"].forEach(id=>document.getElementById(id).addEventListener("input",render));
  ["walkMax","tJuu","tReuse","t1f"].forEach(id=>document.getElementById(id).addEventListener("change",render));
  document.getElementById("sortKey").addEventListener("change",e=>{state.sortKey=e.target.value;render();});
  document.getElementById("sortDir").addEventListener("change",e=>{state.sortDir=e.target.value;render();});
  document.querySelectorAll("#tbl th[data-k]").forEach(th=>{
    th.addEventListener("click",()=>{
      let k=th.dataset.k;
      if(state.sortKey===k){ state.sortDir=(state.sortDir==="asc")?"desc":"asc"; }
      else { state.sortKey=k; state.sortDir=(k==="rentMan"||k==="tsubo"||k==="walk")?"asc":"desc"; }
      render();
    });
  });
  document.getElementById("foot").innerHTML=
